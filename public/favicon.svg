<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid teal background -->
  <rect width="100" height="100" rx="22" fill="#0E676B"/>

  <!-- Left ear -->
  <path d="M 18 48 L 8 22 L 38 36 Z" fill="#FAF6EE"/>
  <path d="M 20 44 L 13 26 L 34 36 Z" fill="#E17272"/>

  <!-- Right ear -->
  <path d="M 82 48 L 92 22 L 62 36 Z" fill="#FAF6EE"/>
  <path d="M 80 44 L 87 26 L 66 36 Z" fill="#E17272"/>

  <!-- Cat head -->
  <circle cx="50" cy="62" r="30" fill="#FAF6EE"/>

  <!-- Eyes -->
  <circle cx="37" cy="57" r="5.5" fill="#0E676B"/>
  <circle cx="35" cy="55" r="2" fill="#FFFFFF"/>
  <circle cx="38.5" cy="58.5" r="0.8" fill="#FFFFFF"/>

